name: Deploy to GitHub Pages

# Build the PWA and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run engine tests
        run: npm run test

      - name: Build
        run: npm run build

      # Enables Pages on first run (source: GitHub Actions) and prepares deploy.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
